<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JM Club | The Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/@rive-app/canvas@2.7.0"></script>
    <style>
        body { background-color: #050505; color: white; overflow-x: hidden; }
        .cyber-card { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .gold-pulse { box-shadow: 0 0 15px #ffd700; border: 2px solid #ffd700; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex flex-col items-center mb-12">
        <div class="w-48 h-48 mb-4">
            <canvas id="canvas" class="w-full h-full"></canvas>
        </div>
        <h1 class="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-600">JM CLUB</h1>
        <p class="text-gray-500 text-sm">Created by Jiban and Manish</p>
        <div id="memberBadge" class="hidden mt-4 px-4 py-1 rounded-full text-xs font-bold bg-yellow-600 text-black gold-pulse">VERIFIED JM MEMBER</div>
    </header>

    <section class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
        <div class="cyber-card p-6 rounded-2xl h-48 overflow-y-auto no-scrollbar">
            <h3 class="text-blue-400 font-bold mb-3">Global Notices</h3>
            <div id="noticeList" class="space-y-2 text-sm text-gray-300"></div>
        </div>
        <div class="cyber-card p-6 rounded-2xl h-48 overflow-y-auto no-scrollbar">
            <h3 class="text-purple-400 font-bold mb-3">Homework & Files</h3>
            <div id="fileList" class="space-y-2"></div>
        </div>
    </section>

    <section class="mb-12">
        <div class="flex gap-4 mb-6">
            <input id="userInput" type="text" placeholder="Ask the Council of 10..." class="flex-1 bg-zinc-900 border border-zinc-800 p-4 rounded-xl focus:outline-none focus:border-blue-500">
            <button onclick="askCouncil()" class="bg-blue-600 px-8 py-4 rounded-xl font-bold hover:bg-blue-700 transition">SEND</button>
        </div>

        <div id="warRoom" class="flex overflow-x-auto gap-6 pb-6 no-scrollbar">
            </div>

        <div id="synthesis" class="cyber-card p-8 rounded-2xl mt-8 hidden">
            <h2 class="text-2xl font-bold text-yellow-500 mb-4">Master Synthesis</h2>
            <p id="synthesisText" class="text-gray-200 leading-relaxed"></p>
        </div>
    </section>

    <section class="max-w-xl mx-auto cyber-card p-8 rounded-3xl">
        <h2 class="text-2xl font-bold mb-6">Apply for Membership</h2>
        <form id="admissionForm" class="space-y-4">
            <input type="text" id="fname" placeholder="First Name" class="w-full bg-zinc-900 p-3 rounded-lg" required>
            <input type="text" id="mname" placeholder="Middle Name (Optional)" class="w-full bg-zinc-900 p-3 rounded-lg">
            <input type="text" id="lname" placeholder="Last Name" class="w-full bg-zinc-900 p-3 rounded-lg" required>
            <textarea id="sop" placeholder="Statement of Purpose" class="w-full bg-zinc-900 p-3 rounded-lg h-32" required></textarea>
            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 py-3 rounded-xl font-bold">SUBMIT APPLICATION</button>
        </form>
    </section>

    <script>
        const apiKey = "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";
        const models = [
            "arcee-ai/trinity-large-preview:free", "nvidia/nemotron-3-super-120b-a12b:free",
            "qwen/qwen3-next-80b-a3b-instruct:free", "openai/gpt-oss-120b:free",
            "z-ai/glm-4.5-air:free", "google/gemma-3n-e4b-it:free",
            "mistralai/mistral-small-3.1-24b-instruct:free", "meta-llama/llama-3.3-70b-instruct:free",
            "nousresearch/hermes-3-llama-3.1-405b:free", "liquid/lfm-2.5-1.2b-thinking:free"
        ];

        // Rive Initialization
        const r = new rive.Rive({
            src: 'YOUR_RIVE_FILE.riv', // Replace with your actual Rive file path
            canvas: document.getElementById('canvas'),
            autoplay: true,
            onLoad: () => { r.resizeDrawingSurfaceToCanvas(); }
        });

        // Form Logic
        document.getElementById('admissionForm').onsubmit = (e) => {
            e.preventDefault();
            const app = {
                id: Date.now(),
                name: `${document.getElementById('fname').value} ${document.getElementById('mname').value} ${document.getElementById('lname').value}`,
                sop: document.getElementById('sop').value,
                status: 'pending'
            };
            const apps = JSON.parse(localStorage.getItem('jm_apps') || '[]');
            apps.push(app);
            localStorage.setItem('jm_apps', JSON.stringify(apps));
            alert('Application Sent!');
            e.target.reset();
        };

        // UI Updates
        function loadData() {
            const notices = JSON.parse(localStorage.getItem('jm_notices') || '[]');
            const files = JSON.parse(localStorage.getItem('jm_files') || '[]');
            const apps = JSON.parse(localStorage.getItem('jm_apps') || '[]');
            
            document.getElementById('noticeList').innerHTML = notices.map(n => `<p>• ${n}</p>`).join('');
            document.getElementById('fileList').innerHTML = files.map(f => `<a href="${f.data}" download="${f.name}" class="block text-blue-400 underline text-sm">${f.name}</a>`).join('');
            
            // Check if user is verified (Simple mock-up: checks if any app is 'approved')
            if(apps.some(a => a.status === 'approved')) {
                document.getElementById('memberBadge').classList.remove('hidden');
            }
        }

        async function askCouncil() {
            const prompt = document.getElementById('userInput').value;
            if(!prompt) return;
            const warRoom = document.getElementById('warRoom');
            warRoom.innerHTML = '';
            
            models.forEach((model, i) => {
                const card = document.createElement('div');
                card.className = "min-w-[400px] cyber-card p-6 rounded-2xl";
                card.innerHTML = `<h4 class="text-xs font-mono text-blue-400 mb-2">${model.split('/')[1]}</h4><div id="res-${i}" class="text-gray-300 text-sm">Thinking...</div>`;
                warRoom.appendChild(card);
                
                fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: model, messages: [{role: "user", content: prompt}] })
                })
                .then(res => res.json())
                .then(data => {
                    document.getElementById(`res-${i}`).innerText = data.choices[0].message.content;
                });
            });
        }

        setInterval(loadData, 2000);
        loadData();
    </script>
</body>
</html>
