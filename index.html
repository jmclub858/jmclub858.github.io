<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JM Club - The Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/@rive-app/canvas@2.7.3"></script>
    <style>
        body { background-color: #050505; color: #e0e0e0; }
        .glass-card { background: rgba(15, 15, 20, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(0, 255, 255, 0.1); }
        .neon-text { text-shadow: 0 0 10px rgba(0, 255, 255, 0.5); }
        /* Horizontal scroll for AI Fiesta style */
        .ai-scroll-container { display: flex; overflow-x: auto; gap: 1rem; padding-bottom: 1rem; scroll-snap-type: x mandatory; }
        .ai-card { min-width: 300px; max-width: 400px; scroll-snap-align: start; }
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen font-sans overflow-x-hidden">

    <header class="p-6 flex justify-between items-center border-b border-gray-800">
        <div class="flex items-center gap-4">
            <canvas id="rive-logo" width="100" height="100"></canvas>
            <h1 class="text-3xl font-bold text-blue-400 neon-text">JM Club</h1>
            <div id="member-badge" class="hidden ml-4 px-3 py-1 bg-yellow-500/20 text-yellow-400 border border-yellow-500 rounded-full animate-pulse">
                Verified JM Member
            </div>
        </div>
        <canvas id="rive-creator" width="300" height="50"></canvas>
    </header>

    <main class="p-6 max-w-7xl mx-auto space-y-8">
        
        <section class="grid grid-cols-1 md:grid-cols-2 gap-6 gs-reveal">
            <div class="glass-card p-6 rounded-xl">
                <h2 class="text-xl font-bold text-purple-400 mb-4">Global Notices</h2>
                <ul id="notice-list" class="space-y-2 max-h-40 overflow-y-auto"></ul>
            </div>
            <div class="glass-card p-6 rounded-xl">
                <h2 class="text-xl font-bold text-blue-400 mb-4">Homework / Files</h2>
                <ul id="file-list" class="space-y-2 max-h-40 overflow-y-auto"></ul>
            </div>
        </section>

        <section class="glass-card p-6 rounded-xl gs-reveal flex flex-col h-[600px]">
            <h2 class="text-2xl font-bold text-cyan-400 mb-4">Council of 10 AIs</h2>
            
            <div class="flex-grow flex flex-col gap-4">
                <div id="chat-history" class="flex-grow overflow-y-auto space-y-4 mb-4"></div>
                
                <div id="ai-responses" class="ai-scroll-container hidden">
                    </div>

                <div id="master-synthesis" class="hidden p-4 bg-blue-900/30 border border-blue-500 rounded-lg mt-4">
                    <h3 class="text-lg font-bold text-blue-300 mb-2">Master Synthesis</h3>
                    <p id="synthesis-text" class="text-sm">Summarizing...</p>
                </div>

                <div class="flex gap-2 mt-auto">
                    <input type="text" id="ai-input" placeholder="Ask the Council..." class="flex-grow p-3 bg-gray-900 border border-gray-700 rounded-lg focus:outline-none focus:border-cyan-500 text-white">
                    <button onclick="askCouncil()" class="px-6 py-3 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-lg transition">Send</button>
                </div>
            </div>
        </section>

        <section class="glass-card p-6 rounded-xl w-full max-w-2xl mx-auto gs-reveal">
            <h2 class="text-2xl font-bold text-purple-400 mb-4">Admission Form</h2>
            <form id="admission-form" class="space-y-4">
                <div class="grid grid-cols-3 gap-4">
                    <input type="text" id="f-name" placeholder="First Name" required class="w-full p-2 bg-gray-900 border border-gray-700 rounded text-white">
                    <input type="text" id="m-name" placeholder="Middle Name" class="w-full p-2 bg-gray-900 border border-gray-700 rounded text-white">
                    <input type="text" id="l-name" placeholder="Last Name" required class="w-full p-2 bg-gray-900 border border-gray-700 rounded text-white">
                </div>
                <textarea id="sop" placeholder="Statement of Purpose" required rows="4" class="w-full p-2 bg-gray-900 border border-gray-700 rounded text-white"></textarea>
                <button type="submit" class="w-full py-3 bg-purple-600 hover:bg-purple-500 font-bold rounded-lg transition">Submit Application</button>
            </form>
            <p id="form-msg" class="text-green-400 mt-2 hidden">Form submitted! Wait for admin approval.</p>
        </section>
    </main>

    <script>
        // --- 1. RIVE ANIMATIONS ---
        // Note: Replace the 'src' with your actual .riv files later. 
        // Using generic shapes as placeholders if files are missing.
        try {
            new rive.Rive({
                src: 'https://cdn.rive.app/animations/vehicles.riv', // Placeholder URL
                canvas: document.getElementById('rive-logo'),
                autoplay: true,
            });
            new rive.Rive({
                src: 'https://cdn.rive.app/animations/vehicles.riv', // Placeholder URL
                canvas: document.getElementById('rive-creator'),
                autoplay: true,
            });
        } catch (e) { console.log("Rive needs actual .riv files to work fully."); }

        // --- 2. GSAP ANIMATIONS ---
        gsap.from(".gs-reveal", { y: 50, opacity: 0, duration: 1, stagger: 0.2, ease: "power3.out" });

        // --- 3. LOAD DATA FROM LOCALSTORAGE ---
        function loadHubData() {
            // Load Notices
            const notices = JSON.parse(localStorage.getItem('jm_notices') || '[]');
            const noticeList = document.getElementById('notice-list');
            noticeList.innerHTML = notices.map(n => `<li class="p-2 bg-gray-800 rounded">📢 ${n}</li>`).join('');

            // Load Files
            const files = JSON.parse(localStorage.getItem('jm_files') || '[]');
            const fileList = document.getElementById('file-list');
            fileList.innerHTML = files.map(f => `<li class="p-2 bg-gray-800 rounded"><a href="${f.data}" download="${f.name}" class="text-blue-400 hover:underline">💾 ${f.name}</a></li>`).join('');

            // Check Membership Status
            const userPhoneInfo = localStorage.getItem('jm_user_status');
            if (userPhoneInfo === 'approved') {
                document.getElementById('member-badge').classList.remove('hidden');
                document.getElementById('admission-form').classList.add('hidden');
            }
        }
        loadHubData();
        // Update data every 2 seconds to catch admin changes
        setInterval(loadHubData, 2000);

        // --- 4. ADMISSION FORM ---
        document.getElementById('admission-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const app = {
                id: Date.now(),
                fname: document.getElementById('f-name').value,
                mname: document.getElementById('m-name').value,
                lname: document.getElementById('l-name').value,
                sop: document.getElementById('sop').value,
                status: 'pending'
            };
            const apps = JSON.parse(localStorage.getItem('jm_applications') || '[]');
            // Check if user already has a pending or approved app
            apps.push(app);
            localStorage.setItem('jm_applications', JSON.stringify(apps));
            localStorage.setItem('jm_current_user_id', app.id); // Remember this user
            
            document.getElementById('form-msg').classList.remove('hidden');
            e.target.reset();
        });

        // --- 5. COUNCIL OF 10 AIs LOGIC ---
        const API_KEY = "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";
        const models = [
            "arcee-ai/trinity-large-preview:free", "nvidia/nemotron-3-super-120b-a12b:free",
            "qwen/qwen3-next-80b-a3b-instruct:free", "openai/gpt-oss-120b:free",
            "z-ai/glm-4.5-air:free", "google/gemma-3n-e4b-it:free",
            "mistralai/mistral-small-3.1-24b-instruct:free", "meta-llama/llama-3.3-70b-instruct:free",
            "nousresearch/hermes-3-llama-3.1-405b:free", "liquid/lfm-2.5-1.2b-thinking:free"
        ];

        async function askCouncil() {
            const inputEl = document.getElementById('ai-input');
            const question = inputEl.value;
            if(!question) return;

            // Show user message
            const history = document.getElementById('chat-history');
            history.innerHTML += `<div class="text-right"><span class="bg-gray-700 p-2 rounded-lg inline-block text-white">${question}</span></div>`;
            inputEl.value = '';

            // Setup UI for AI answers
            const container = document.getElementById('ai-responses');
            container.innerHTML = '';
            container.classList.remove('hidden');
            document.getElementById('master-synthesis').classList.add('hidden');

            // Create cards for each model
            models.forEach(model => {
                const shortName = model.split('/')[1].split(':')[0];
                container.innerHTML += `
                    <div class="ai-card glass-card p-4 flex flex-col rounded-lg" id="card-${shortName}">
                        <h4 class="font-bold text-cyan-300 border-b border-gray-700 pb-2 mb-2">${shortName}</h4>
                        <div class="text-sm text-gray-300 flex-grow overflow-y-auto" id="text-${shortName}">Thinking...</div>
                    </div>`;
            });

            // Fetch answers at the same time
            const promises = models.map(async (model) => {
                const shortName = model.split('/')[1].split(':')[0];
                try {
                    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${API_KEY}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            model: model,
                            messages: [{ role: "user", content: question }]
                        })
                    });
                    const data = await res.json();
                    const answer = data.choices[0].message.content;
                    document.getElementById(`text-${shortName}`).innerText = answer;
                    return answer;
                } catch (err) {
                    document.getElementById(`text-${shortName}`).innerText = "Error fetching answer.";
                    return "Error";
                }
            });

            const allAnswers = await Promise.all(promises);

            // Master Synthesis (Use one fast model to summarize)
            const synthBox = document.getElementById('master-synthesis');
            synthBox.classList.remove('hidden');
            document.getElementById('synthesis-text').innerText = "Synthesizing 10 answers...";

            try {
                const synthRes = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "google/gemma-3n-e4b-it:free",
                        messages: [{ role: "user", content: `Summarize these 10 AI answers into one perfect conclusion: ${allAnswers.join(" | ")}` }]
                    })
                });
                const synthData = await synthRes.json();
                document.getElementById('synthesis-text').innerText = synthData.choices[0].message.content;
            } catch (err) {
                document.getElementById('synthesis-text').innerText = "Failed to synthesize.";
            }
        }
    </script>
</body>
</html>
